<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Organizer Details</title>
  <link rel="stylesheet" href="organization-details.css" />
</head>
<body>
  <div class="overlay" id="overlay">
    <div class="modal-card">
      <button class="close-btn" id="closeBtn" aria-label="Close modal">&times;</button>

      <div class="modal-header">
        <h1 id="orgTitle">Loading...</h1>
        <span class="status-badge awaiting" id="statusBadge">Loading...</span>
      </div>

      <div class="details-grid">
        <div class="label">Org. Name:</div>
        <div class="value" id="orgName">Loading...</div>

        <div class="label">Social Links:</div>
        <div class="value" id="socialLinks">—</div>

        <div class="label">Email:</div>
        <div class="value" id="email">—</div>

        <div class="label">Phone No:</div>
        <div class="value" id="phoneNumber">—</div>

        <div class="label">Location:</div>
        <div class="value" id="location">—</div>
      </div>

      <div class="description-section">
        <h2>Description</h2>
        <div class="description-box" id="description">
          Loading organization description...
        </div>
      </div>
    </div>
  </div>

  <script src="organization-details.js"></script>
</body>
</html>
