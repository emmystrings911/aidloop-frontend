<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AIDLoop Organizer Login</title>

  <link rel="stylesheet" href="../../assets/css/shared.css" />
  <link rel="stylesheet" href="organizer-login.css" />

  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  />
</head>

<body>
  <main class="login-page">
    <section class="login-card">

      <div class="logo-wrap">
        <img src="../../assets/Images/Logo.png" class="logo"/>
        <p>Connecting Volunteers to verified community events</p>
      </div>

      <h1>Welcome back to AidLoop</h1>
      <p class="subtitle">
        Sign in to access your organizers dashboard, manage volunteer events, and track participant activity
      </p>

      <form id="loginForm">

        <!-- Email -->
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" placeholder="Enter your email" required />
          <small id="emailError" class="error-message"></small>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label>Password</label>
          <div class="password-wrap">
            <input type="password" id="password" placeholder="Enter your password" required />
            <button type="button" id="togglePassword">
              <i class="fa-regular fa-eye-slash"></i>
            </button>
          </div>
          <small id="passwordError" class="error-message"></small>
        </div>

        <!-- Messages -->
        <small id="formError" class="form-error"></small>
        <small id="formSuccess" class="success-message"></small>

        <!-- Button -->
        <button id="loginBtn" type="submit" class="btn-primary">
          Log in
        </button>

        <div class="links">
          <a href="#">Forgot Password</a>
          <span>|</span>
          <a href="../signup/organizer-signup.html">
            Create organization account
          </a>
        </div>

      </form>
    </section>
  </main>

  <script type="module" src="organizer-login.js"></script>
</body>
</html>
