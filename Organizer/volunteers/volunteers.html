<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AIDLoop Volunteers</title>

  <link rel="stylesheet" href="../assets/css/shared.css" />
  <link rel="stylesheet" href="volunteers.css" />

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  />
</head>
<body>
  <div class="dashboard-layout">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <img src="/assets/Images/Logo.png" alt="AIDLoop Logo" />
      </div>

      <ul class="sidebar-menu">
        <li>
          <a href="../dashboard/organizer-dashboard.html">
            <i class="fa-regular fa-house"></i>
            <span>Dashboard</span>
          </a>
        </li>

        <li>
          <a href="../events/create-event.html">
            <i class="fa-regular fa-square-plus"></i>
            <span>Create Events</span>
          </a>
        </li>

        <li>
          <a href="../events/event-listing.html">
            <i class="fa-regular fa-calendar"></i>
            <span>Events</span>
          </a>
        </li>

        <li class="active">
          <a href="volunteers.html">
            <i class="fa-solid fa-users"></i>
            <span>Volunteers</span>
          </a>
        </li>

        <li>
          <a href="../certificates/organizer-certificates.html">
            <i class="fa-regular fa-id-card"></i>
            <span>Certificates</span>
          </a>
        </li>

        <li>
          <a href="../profile/organizer-profile.html">
            <i class="fa-regular fa-address-card"></i>
            <span>Profile</span>
          </a>
        </li>

        <li>
          <button type="button" id="logoutBtn" class="sidebar-logout">
            <i class="fa-solid fa-arrow-right-from-bracket"></i>
            <span>Log out</span>
          </button>
        </li>
      </ul>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <div class="topbar-left">
          <h1 class="page-title">Volunteers</h1>
          <p class="page-subtitle">Manage Volunteers across all events.</p>
        </div>

        <div class="topbar-right">
          <button class="icon-btn" type="button">
            <i class="fa-regular fa-bell"></i>
          </button>

          <button class="icon-btn" type="button">
            <i class="fa-regular fa-circle-user"></i>
          </button>
        </div>
      </header>

      <section class="page-content">
        <div class="toolbar">
          <div class="filter-tabs">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="confirmed">Confirmed</button>
            <button class="filter-btn" data-filter="upcoming">Upcoming</button>
          </div>

          <div class="search-box">
            <input
              type="text"
              id="searchInput"
              placeholder="Search volunteer name or email"
            />
            <button type="button">
              <i class="fa-solid fa-magnifying-glass"></i>
            </button>
          </div>
        </div>

        <div class="stats-grid three-cards">
          <div class="stat-card">
            <div class="stat-number" id="totalRegistered">0</div>
            <div class="stat-footer">
              <i class="fa-solid fa-users"></i>
              <span>Total Registered</span>
            </div>
          </div>

          <div class="stat-card">
            <div class="stat-number" id="attendedCount">0</div>
            <div class="stat-footer">
              <i class="fa-regular fa-circle-check"></i>
              <span>Attended</span>
            </div>
          </div>

          <div class="stat-card">
            <div class="stat-number" id="noShowCount">0</div>
            <div class="stat-footer">
              <i class="fa-regular fa-clock"></i>
              <span>No Show</span>
            </div>
          </div>
        </div>

        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Status</th>
                    <th>Attendance</th>
                    <th>Certificate</th>
                    <th></th>
                </tr>
            </thead>

            <tbody id="volunteerTable">
              <tr>
                <td colspan="5">Loading volunteers...</td>
              </tr>
            </tbody>
          </table>
        </div>

        <div class="table-footer">
          <p id="tableCountText">Showing 0 of 0 entries</p>

          <div class="pagination">
            <button type="button" class="page-btn">Prev</button>
            <button type="button" class="page-btn">1</button>
            <button type="button" class="page-btn active">2</button>
            <button type="button" class="page-btn">3</button>
            <button type="button" class="page-btn">...</button>
            <button type="button" class="page-btn">8</button>
            <button type="button" class="page-btn">Next</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="volunteers.js"></script>
</body>
</html>
