<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AIDLoop Organizer Certificates</title>

<link rel="stylesheet" href="../../assets/css/shared.css">
<link rel="stylesheet" href="organizer-certificates.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>


<body>

<div class="dashboard-layout">

<!-- Sidebar -->

<aside class="sidebar">

<div class="sidebar-logo">
<img src="../../assets/Images/Logo.png">
</div>

<ul class="sidebar-menu">

<li>
<a href="../dashboard/organizer-dashboard.html">
<i class="fa-regular fa-house"></i>
<span>Dashboard</span>
</a>
</li>

<li>
<a href="../events/create-event.html">
<i class="fa-regular fa-square-plus"></i>
<span>Create Events</span>
</a>
</li>

<li>
<a href="../events/event-listing.html">
<i class="fa-regular fa-calendar"></i>
<span>Events</span>
</a>
</li>

<li>
<a href="../volunteers/volunteers.html">
<i class="fa-solid fa-users"></i>
<span>Volunteers</span>
</a>
</li>

<li class="active">
<a href="#">
<i class="fa-regular fa-id-card"></i>
<span>Certificates</span>
</a>
</li>

<li>
<button id="logoutBtn" class="sidebar-logout">
<i class="fa-solid fa-arrow-right-from-bracket"></i>
<span>Log out</span>
</button>
</li>

</ul>

</aside>


<!-- Main Content -->

<main class="main-content">

<header class="topbar">

<div>
<h1 class="page-title">Certificates</h1>
<p class="page-subtitle">Manage volunteer certificates</p>
</div>

</header>


<section class="page-content">


<!-- Stats -->

<div class="stats-grid">

<div class="stat-card">
<div class="stat-icon trophy">
<i class="fa-solid fa-trophy"></i>
</div>
<div>
<p>Total Certificates</p>
<h3 id="totalCertificates">0</h3>
</div>
</div>

<div class="stat-card">
<div class="stat-icon issued">
<i class="fa-solid fa-circle-check"></i>
</div>
<div>
<p>Issued</p>
<h3 id="issuedCertificates">0</h3>
</div>
</div>

<div class="stat-card">
<div class="stat-icon pending">
<i class="fa-solid fa-clock"></i>
</div>
<div>
<p>Pending</p>
<h3 id="pendingCertificates">0</h3>
</div>
</div>

</div>



<!-- Certificates Table -->

<div class="table-wrapper">

<table>

<thead>
<tr>
<th>Name</th>
<th>Email</th>
<th>Event</th>
<th>Date</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="certificatesTable">

<tr>
<td colspan="6">Loading certificates...</td>
</tr>

</tbody>

</table>

</div>


<p id="tableCountText">Showing 0 certificates</p>

</section>

</main>

</div>


<script type="module" src="organizer-certificates.js"></script>
<div id="volunteerHoverCard" class="hover-card hidden"></div>
</body>
</html>
