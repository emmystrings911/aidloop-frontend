<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Verified Successfully</title>
  <link rel="stylesheet" href="../assets/css/shared.css" />
  <link rel="stylesheet" href="email-verified.css" />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  />
</head>
<body>
  <main class="verified-page">
    <section class="verified-card">
      <div class="icon-wrap">
        <div class="success-icon">
          <i class="fa-solid fa-check"></i>
        </div>
      </div>

      <h1>Email Verified Successfully</h1>

      <div class="mini-text" id="statusText"></div>

      <div class="divider"></div>

      <p class="message">
        Your email has been verified. You can now access your dashboard.
      </p>

      <a href="../signup/organizer-signup.html" class="change-email-link">
        Change Email Address
      </a>

      <div class="divider"></div>

      <a href="../login/organizer-login.html" class="back-link">
        Back to Login
      </a>

      <button id="continueBtn" class="primary-btn">
        Continue to Dashboard
      </button>
    </section>
  </main>

  <script type="module" src="email-verified.js"></script>
</body>
</html>
