<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Event Details</title>

  <link rel="stylesheet" href="../../assets/css/shared.css" />
  <link rel="stylesheet" href="event-details.css" />

  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>

<body>
  <div class="dashboard-layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <img src="../../assets/Images/Logo.png" />
      </div>

      <ul class="sidebar-menu">
        <li><a href="../dashboard/organizer-dashboard.html">Dashboard</a></li>
        <li><a href="create-event.html">Create Events</a></li>
        <li class="active"><a href="event-listing.html">Events</a></li>
        <li><a href="../volunteers/volunteers.html">Volunteers</a></li>
        <li><a href="../certificates/organizer-certificates.html">Certificates</a></li>
        <li><a href="../profile/organizer-profile.html">Profile</a></li>
        <li><button id="logoutBtn">Logout</button></li>
      </ul>
    </aside>

    <!-- Main -->
    <main class="main-content">

      <!-- Header -->
      <header class="topbar">
        <div>
          <h1 id="eventName">Loading...</h1>
          <span id="statusBadge" class="status-badge">Status</span>
        </div>

        <div class="top-actions">
          <button id="editBtn" class="btn primary">Edit</button>
          <button id="viewVolunteersBtn" class="btn">Volunteers</button>
          <button id="viewCertificatesBtn" class="btn">Certificates</button>
          <button id="cancelBtn" class="btn danger">Cancel</button>
        </div>
      </header>

      <!-- Content -->
      <section class="event-details">

        <div class="event-image">
          <img id="eventImage" src="../../assets/Images/volunteer.png" />
        </div>

        <div class="description-box" id="eventDescription"></div>

        <!-- Meta Info -->
        <div class="event-meta">
          <div class="meta-card">
            <h4>Date</h4>
            <p id="eventDate"></p>
          </div>

          <div class="meta-card">
            <h4>Time</h4>
            <p id="eventTime"></p>
          </div>

          <div class="meta-card">
            <h4>Location</h4>
            <p id="eventLocation"></p>
          </div>
        </div>

        <!-- Stats -->
        <div class="stats">
          <div class="stat">
            <h2 id="totalSlots">0</h2>
            <p>Total Slots</p>
          </div>
          <div class="stat">
            <h2 id="registered">0</h2>
            <p>Registered</p>
          </div>
          <div class="stat">
            <h2 id="remaining">0</h2>
            <p>Remaining</p>
          </div>
        </div>

        <!-- Requirements -->
        <div class="requirements">
          <h3>Volunteer Requirements</h3>
          <ul id="requirementsList"></ul>
        </div>

        <!-- Volunteers -->
        <div class="table-wrapper">
          <h3>Recent Volunteers</h3>
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Date</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="volunteerTable"></tbody>
          </table>
        </div>

      </section>
    </main>
  </div>

  <script type="module" src="event-details.js"></script>
</body>
</html>
