<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AIDLoop Organizer Signup</title>

 <link rel="stylesheet" href="../../assets/css/shared.css" />
<link rel="stylesheet" href="organizer-signup.css" />

  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  />
</head>

<body>
  <main class="signup-page">
    <section class="signup-card">

      <div class="logo-wrap">
        <img src="../../assets/Images/Logo.png" class="logo"/>
        <h2>Sign Up</h2>
        <p>Create an organizers account to start hosting volunteer events on AidLoop</p>
      </div>

      <form id="signupForm">

        <h3 class="section-title">Organization Information</h3>

        <div class="form-group">
          <label>Organization Name</label>
          <input type="text" id="name" placeholder="your full name" required />
        </div>

        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" placeholder="Your email here..." required />
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="Enter password" required />
        </div>

        <div class="form-group">
          <label>Phone Number</label>
          <input type="text" id="phone" placeholder="Your phone number here..." />
        </div>

        <h3 class="section-title">Location</h3>

        <div class="row">
          <input type="text" id="state" placeholder="State" />
          <input type="text" id="city" placeholder="City" />
        </div>

        <h3 class="section-title">Organization Details</h3>

        <div class="form-group">
          <label>About the Organization</label>
          <textarea id="description" placeholder="Briefly describe your organization"></textarea>
        </div>

        <div class="form-group">
          <label>Social Media Link</label>
          <input type="text" id="social" placeholder="https://instagram.com/yourorganization"/>
        </div>

        <small id="formError" class="form-error"></small>
        <small id="formSuccess" class="success-message"></small>

        <button id="signupBtn" type="submit" class="btn-primary">
          Sign Up
        </button>

        <p class="login-link">
          Already have an account?
          <a href="../login/organizer-login.html">Login</a>
        </p>

      </form>
    </section>
  </main>

  <script type="module" src="organizer-signup.js"></script>
</body>
</html>
